name: flutter_application_1
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter

  # isar: ^3.1.0
  # isar_flutter_libs: ^3.1.0
  # path_provider: ^2.0.17


  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  isar_generator: ^3.1.0
  build_runner: ^2.4.0

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Thin.ttf
          weight: 100

        - asset: assets/fonts/Inter_24pt-ExtraLight.ttf
          weight: 200

        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400

        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
        
        - asset: assets/fonts/Inter_18pt-ExtraBold.ttf
          weight: 800

        - asset: assets/fonts/Inter_18pt-Black.ttf
          weight: 900

    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-ExtraLight.ttf
          weight: 200

        - asset: assets/fonts/Manrope-Light.ttf
          weight: 300

        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400

        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500

        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 700

        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 800
        

